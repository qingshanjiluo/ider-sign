name: 健康检测 - 自动升级到120级

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: '手动触发'

jobs:
  health:
    name: 检测账号健康状态并自动升级
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        working-directory: 工单系统
        run: npm install

      - name: 执行健康检测
        working-directory: 工单系统
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: ${{ secrets.API_BASE }}
          SIGN_KEY: ${{ secrets.SIGN_KEY }}
          CLIENT_VERSION: ${{ secrets.CLIENT_VERSION }}
        run: node gh-actions/health_check.js
