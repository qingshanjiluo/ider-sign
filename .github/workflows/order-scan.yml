name: 工单扫描 - 自动注册刷怪

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: '手动触发'

jobs:
  scan:
    name: 扫描已审核工单并自动注册
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        working-directory: 工单系统
        run: npm install

      - name: 执行工单扫描
        working-directory: 工单系统
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: ${{ secrets.API_BASE }}
          SIGN_KEY: ${{ secrets.SIGN_KEY }}
          CLIENT_VERSION: ${{ secrets.CLIENT_VERSION }}
        run: node gh-actions/scan_orders.js
