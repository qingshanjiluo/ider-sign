name: 📬 邮件筑基丹 - Mail & Use Pills

on:
  workflow_dispatch:
    inputs:
      accounts_data:
        description: '账号数据（格式: username,password，每行一个）'
        required: true
        type: string
      max_accounts:
        description: '处理的账号数量（默认全部）'
        required: false
        default: ''
        type: string
  push:
    branches: [ main ]
    paths:
      - '批量注册工具/mail_claim_and_use.js'
      - '批量注册工具/_anti_detect_shared.js'

jobs:
  mail-pill:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '批量注册工具/package-lock.json'

    - name: 安装依赖
      run: |
        cd 批量注册工具
        npm install

    - name: 准备账号文件
      run: |
        cd 批量注册工具
        echo "${{ github.event.inputs.accounts_data || secrets.ACCOUNTS_DATA || '' }}" > alchemy_accounts.txt
        echo "📋 账号文件内容:"
        cat alchemy_accounts.txt

    - name: 运行邮件领取+筑基丹使用
      run: |
        cd 批量注册工具
        export CI=true
        export MAX_ACCOUNTS="${{ github.event.inputs.max_accounts || '' }}"
        echo "📬 运行邮件筑基丹脚本..."
        node mail_claim_and_use.js

    - name: 上传结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mail-pill-result
        path: 批量注册工具/mail_pill_result_*.json
        retention-days: 7

    - name: 输出结果摘要
      if: always()
      run: |
        cd 批量注册工具
        echo "📊 执行结果:"
        ls -la mail_pill_result_*.json 2>/dev/null || echo "无结果文件"
        echo ""
        echo "📋 最新结果预览:"
        cat mail_pill_result_*.json 2>/dev/null | head -100 || echo "无结果内容"
