name: ⚔️ 一键自动刷怪

on:
  workflow_dispatch:
    inputs:
      max_accounts:
        description: '账号数量（留空=全部）'
        required: false
        default: ''
        type: string
      range:
        description: '范围如 1-10（留空=全部）'
        required: false
        default: ''
        type: string

jobs:
  auto-farm:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '批量注册工具/package-lock.json'

      - name: 安装依赖
        run: |
          cd 批量注册工具
          npm install

