          echo "📊 账号数量: $(wc -l < 批量注册工具/alchemy_accounts.txt)"

      - name: 运行一键刷怪
        env:
          CI: "true"
          MAX_ACCOUNTS: ${{ github.event.inputs.max_accounts || '' }}
          RANGE: ${{ github.event.inputs.range || '' }}
        run: |
          cd 批量注册工具
          echo "⚔️ 开始一键自动刷怪..."
          node auto_farm.js

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-farm-result
          path: 批量注册工具/auto_farm_result_*.json
          retention-days: 7

      - name: 结果摘要
        if: always()
        run: |
          cd 批量注册工具
          echo "📊 执行结果:"
          ls -la auto_farm_result_*.json 2>/dev/null && cat auto_farm_result_*.json | head -200 || echo "无结果文件"
