<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 自动挂机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 420px; 
      min-height: 500px;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; 
      background: #0a0e1a; 
      color: #e0e0e0;
      padding: 12px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1525; }
    ::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 2px; }

    .header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a3a5c;
    }
    .header h1 { 
      font-size: 16px; 
      color: #f1c40f; 
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.online { background: #4ecdc4; }
    .status-dot.offline { background: #e74c3c; }
    .status-dot.running { background: #2ecc71; animation: pulse 1s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .section {
      background: #1a2236;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #2a3a5c;
    }
    .section h2 {
      font-size: 13px;
      color: #4ecdc4;
      margin-bottom: 8px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn-primary { background: #4ecdc4; color: #0a0e1a; }
    .btn-primary:hover { background: #45b7b0; }
    .btn-primary:disabled { background: #2a5a54; color: #667; cursor: not-allowed; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-danger:disabled { background: #5a2a2a; color: #667; cursor: not-allowed; }
    .btn-secondary { background: #2a3a5c; color: #e0e0e0; }
    .btn-secondary:hover { background: #3a4a6c; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }

    .btn-group { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .stat-item {
      background: #0d1525;
      padding: 6px 8px;
      border-radius: 6px;
      text-align: center;
    }
    .stat-item .label { color: #8899bb; font-size: 11px; }
    .stat-item .value { color: #f1c40f; font-size: 14px; font-weight: bold; }

    .model-select {
      width: 100%;
      padding: 6px 8px;
      background: #0d1525;
      border: 1px solid #2a3a5c;
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .model-select:focus { outline: none; border-color: #4ecdc4; }

    .log-area {
      background: #0d1525;
      border-radius: 6px;
      padding: 8px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 11px;
      font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.5;
    }
    .log-area .log-entry { color: #8899bb; }
    .log-area .log-entry.info { color: #4ecdc4; }
    .log-area .log-entry.warn { color: #f39c12; }
    .log-area .log-entry.error { color: #e74c3c; }
    .log-area .log-entry.action { color: #f1c40f; }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .tab-btn {
      padding: 4px 12px;
      background: #0d1525;
      border: 1px solid #2a3a5c;
      color: #8899bb;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: #1a2236; color: #e0e0e0; }
    .tab-btn.active {
      background: #4ecdc4;
      color: #0a0e1a;
      border-color: #4ecdc4;
    }

    .action-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 6px;
      font-size: 12px;
      border-bottom: 1px solid #0d1525;
    }
    .action-item .name { color: #e0e0e0; flex: 1; }
    .action-item .count { color: #f1c40f; width: 40px; text-align: right; }
    .action-item .bar-wrap { flex: 1; margin: 0 8px; }
    .action-item .bar {
      height: 4px;
      background: linear-gradient(90deg, #4ecdc4, #f1c40f);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .config-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .config-row label { color: #8899bb; }
    .config-row input[type="number"] {
      width: 70px;
      padding: 3px 6px;
      background: #0d1525;
      border: 1px solid #2a3a5c;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 12px;
    }
    .config-row input[type="number"]:focus { outline: none; border-color: #4ecdc4; }
    .config-row input[type="checkbox"] {
      accent-color: #4ecdc4;
      width: 16px;
      height: 16px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .history-table th {
      color: #8899bb;
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid #2a3a5c;
      font-size: 11px;
      position: sticky;
      top: 0;
      background: #1a2236;
    }
    .history-table td {
      padding: 3px 6px;
      border-bottom: 1px solid #0d1525;
      font-family: monospace;
    }
    .history-table .step-num { color: #667; }
    .history-table .action-name { color: #4ecdc4; }
    .history-table .q-val { color: #f1c40f; }
    .history-table .timestamp { color: #667; font-size: 10px; }

    .model-info {
      font-size: 11px;
      color: #667;
      margin-top: 4px;
      line-height: 1.6;
    }
    .model-info strong { color: #8899bb; }

    .import-section {
      margin-top: 8px;
      padding: 8px;
      background: #0d1525;
      border-radius: 6px;
      border: 1px dashed #2a3a5c;
    }
    .import-section input[type="file"] {
      font-size: 11px;
      color: #8899bb;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 AI 自动挂机</h1>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="status-dot offline" id="statusDot"></span>
      <span id="statusText" style="font-size:12px;color:#8899bb">未连接</span>
    </div>
  </div>

  <!-- 模型选择 -->
  <div class="section">
    <h2>📦 模型</h2>
    <select id="modelSelect" class="model-select">
      <option value="">-- 请选择模型 --</option>
    </select>
    <div class="model-info" id="modelInfo">
      模型文件放在插件目录 <strong>models/</strong> 下，或点击下方导入
    </div>
    <div class="import-section">
      <input type="file" id="modelFileInput" accept=".json">
      <div style="font-size:11px;color:#667;margin-top:4px">导入训练好的模型JSON文件</div>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="section">
    <h2>🎮 控制</h2>
    <div class="config-row">
      <label>决策间隔 (ms)</label>
      <input type="number" id="intervalInput" value="2000" min="500" max="30000" step="500">
    </div>
    <div class="config-row">
      <label>自动战斗</label>
      <input type="checkbox" id="autoBattleCheck" checked>
    </div>
    <div class="config-row">
      <label>自动使用药水</label>
      <input type="checkbox" id="autoPotionCheck" checked>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn" disabled>▶ 开始挂机</button>
      <button class="btn btn-danger" id="stopBtn" disabled>⏹ 停止</button>
      <button class="btn btn-secondary" id="refreshBtn">🔄 刷新状态</button>
    </div>
  </div>

  <!-- 状态面板 -->
  <div class="section">
    <h2>📊 状态</h2>
    <div class="stat-grid">
      <div class="stat-item"><div class="label">等级</div><div class="value" id="statLevel">-</div></div>
      <div class="stat-item"><div class="label">战力</div><div class="value" id="statPower">-</div></div>
      <div class="stat-item"><div class="label">HP</div><div class="value" id="statHp">-</div></div>
      <div class="stat-item"><div class="label">灵石</div><div class="value" id="statStones">-</div></div>
      <div class="stat-item"><div class="label">步数</div><div class="value" id="statSteps">0</div></div>
      <div class="stat-item"><div class="label">运行时间</div><div class="value" id="statTime">00:00</div></div>
    </div>
  </div>

  <!-- 标签页 -->
  <div class="section">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="actions">📊 动作统计</button>
      <button class="tab-btn" data-tab="history">📝 决策历史</button>
      <button class="tab-btn" data-tab="config">⚙️ 配置</button>
    </div>

    <!-- 动作统计 -->
    <div class="tab-content" id="tabActions">
      <div class="action-list" id="actionStats">
        <div style="color:#667;font-size:12px;text-align:center;padding:20px">暂无数据，启动挂机后显示</div>
      </div>
    </div>

    <!-- 决策历史 -->
    <div class="tab-content" id="tabHistory" style="display:none">
      <div style="max-height:200px;overflow-y:auto" id="historyContainer">
        <table class="history-table" id="historyTable">
          <thead>
            <tr><th>步数</th><th>动作</th><th>Q值</th><th>时间</th></tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="4" style="color:#667;text-align:center;padding:10px">暂无历史</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 配置 -->
    <div class="tab-content" id="tabConfig" style="display:none">
      <div class="config-row">
        <label>低血量回城 (%)</label>
        <input type="number" id="configLowHp" value="30" min="10" max="80">
      </div>
      <div class="config-row">
        <label>自动整理装备</label>
        <input type="checkbox" id="configAutoEquip" checked>
      </div>
      <div class="config-row">
        <label>自动学习技能</label>
        <input type="checkbox" id="configAutoSkill" checked>
      </div>
      <div class="config-row">
        <label>自动宗门任务</label>
        <input type="checkbox" id="configAutoSect" checked>
      </div>
      <div class="config-row">
        <label>自动洞府采集</label>
        <input type="checkbox" id="configAutoCave" checked>
      </div>
      <div class="config-row">
        <label>自动领取邮件</label>
        <input type="checkbox" id="configAutoMail" checked>
      </div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="section">
    <h2>📝 日志</h2>
    <div class="log-area" id="logArea">
      <div class="log-entry info">[系统] 插件已加载，等待连接...</div>
    </div>
  </div>

  <script src="dqn_inference.js"></script>
  <script src="popup.js"></script>
</body>
</html>
